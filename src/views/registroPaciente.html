<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../../assets/styles/style.css">
</head>
<body>
    
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark menu">
            <div class="container-fluid">
              <a class="navbar-brand" href="#">
                <img src="../../assets/img/logotipoSura.png" alt="" height="40" width="50">
              </a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Features</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Pricing</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                  </li>
                </ul>
              </div>
            </div>
          </nav>
    </header>
    <main>
        <section class="container my-5">
            <div class="row">
                <div class="col-12 col-md-8">
                    <form class="border rounded shadow p-5">
                        <div class="row">
                            <div class="col-6">
                                <label class="form-label">Nombre:</label> <br>
                                <input class="form-control" type="text" name="" id="nombrePaciente">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Fecha Nacimiento:</label> <br>
                                <input class="form-control" type="date" name="" id="nacimientoPaciente">
                            </div>
                        </div>

                        <div class="row my-3">
                            <div class="col-6">
                                <label class="form-label">Ciudad:</label> <br>
                                <input class="form-control" type="text" name="" id="ciudadPaciente">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Correo Electrónico:</label> <br>
                                <input class="form-control" type="email" name="" id="correoPaciente">
                            </div>
                        </div>

                        <div class="row my-3">
                            <div class="col-6">
                                <label class="form-label">Teléfono:</label> <br>
                                <input class="form-control" type="number" name="" id="telefonoPaciente">
                            </div>
                            <div class="col-6">
                                <label class="form-label">IPS</label> <br>
                                <input class="form-control" type="text" name="" id="ipsPaciente">
                            </div>
                        </div>

                        <div class="row my-3">
                            <div class="col-6">
                                <label class="form-label">Fecha Afiliación:</label> <br>
                                <input class="form-control" type="date" name="" id="fechaAfiliacionPaciente">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Grupo Ingreso</label> <br>
                                <select class="form-select" id="selectGrupoIngresoPaciente">
                                    <option selected>Selecciona un grupo de ingreso</option>
                                    <option value="a">A</option>
                                    <option value="b">B</option>
                                    <option value="c">C</option>
                                  </select>
                            </div>
                        </div>
                        <div class="row my-3">
                            <div class="mb-3 form-check ms-3">
                                <input type="checkbox" class="form-check-input" id="tienePolizaPaciente">
                                <label class="form-check-label" for="exampleCheck1">El paciente tiene póliza</label>
                              </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="botonRegistroPaciente">Registrar</button> <br><br>
                        <button type="reset" class="btn btn-primary w-20 mx-auto d-block" id="botonRegistroPaciente">Limpiar</button>
                    </form>
                </div>
                <div class="col-2 col-md-4 align-self-center">
                    <h3>Registra nuestros pacientes</h3>
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Pariatur obcaecati cumque hic voluptatum nulla esse quasi magni nisi nostrum animi tempore vero quis in sunt praesentium quas, voluptate doloremque porro?</p>
                    <img src="../../assets/img/pacientefeliz.png" alt="paciente" class="img-fluid">
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>

    <script src="../controllers/controladorRegistroPaciente.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
